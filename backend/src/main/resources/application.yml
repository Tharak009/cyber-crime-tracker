spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cyber_crime_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:no-reply@example.com}
    password: ${MAIL_PASSWORD:password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:${SERVER_PORT:8081}}

app:
  jwt:
    secret: ${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
    expiration-ms: 86400000
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  file-storage-path: ${FILE_STORAGE_PATH:uploads}

logging:
  level:
    "[org.springframework.security]": INFO
